esphome:
  name: h2oh_no
  friendly_name: H2Oh-no

  on_boot:
    - priority: 900
      then:
        - script.execute: safe_boot

bk72xx:
  board: generic-bk7231n-qfn32-tuya

external_components:
  - source:
      type: local
      path: components

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: !secret wifi_ap_ssid
    password: !secret wifi_ap_password

captive_portal:

###############################################################################
# 74HC595
###############################################################################

sn74hc595:
  - id: valves_hub
    data_pin: P16
    clock_pin: P22
    latch_pin: P20
    sr_count: 1

  - id: leds_hub
    data_pin: P9
    clock_pin: P15
    latch_pin: P17
    sr_count: 1

###############################################################################
# BUZZER
###############################################################################

output:
  - platform: gpio
    pin: P14
    id: buzzer

###############################################################################
# STATUS LEDS
###############################################################################

switch:
  # STATUS LEDS (inverted: HW ties LED cathodes to 595; SR LOW = LED ON at power-on zeros)
  - platform: gpio
    id: led_1
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 0
      inverted: true

  - platform: gpio
    id: led_2
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 1
      inverted: true

  - platform: gpio
    id: led_3
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 2
      inverted: true

  - platform: gpio
    id: led_4
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 3
      inverted: true

  - platform: gpio
    id: led_5
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 4
      inverted: true

  - platform: gpio
    id: led_6
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 5
      inverted: true

  - platform: gpio
    id: led_7
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 6
      inverted: true

  - platform: gpio
    id: led_8
    internal: true
    pin:
      sn74hc595: leds_hub
      number: 7
      inverted: true

  - platform: gpio
    id: valve_1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 0 }

  - platform: gpio
    id: valve_2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 1 }

  - platform: gpio
    id: valve_3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 2 }

  - platform: gpio
    id: valve_4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 3 }

  - platform: gpio
    id: valve_5
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 4 }

  - platform: gpio
    id: valve_6
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 5 }

  - platform: gpio
    id: valve_7
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 6 }

  - platform: gpio
    id: valve_8
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { sn74hc595: valves_hub, number: 7 }

###############################################################################
# SPRINKLER (zone timing + cycles; drives internal valve_* switches)
###############################################################################

sprinkler:
  - id: h2oh_sprinkler
    main_switch: "H2Oh-no sprinklers"
    auto_advance_switch: "H2Oh-no auto advance"
    reverse_switch: "H2Oh-no reverse"
    multiplier_number: "H2Oh-no duration multiplier"
    repeat_number: "H2Oh-no cycle repeat"
    valves:
      - valve_switch: "H2Oh-no zone 1"
        enable_switch: "H2Oh-no enable zone 1"
        run_duration_number:
          id: z1_run_duration
          name: "H2Oh-no zone 1 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_1
      - valve_switch: "H2Oh-no zone 2"
        enable_switch: "H2Oh-no enable zone 2"
        run_duration_number:
          id: z2_run_duration
          name: "H2Oh-no zone 2 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_2
      - valve_switch: "H2Oh-no zone 3"
        enable_switch: "H2Oh-no enable zone 3"
        run_duration_number:
          id: z3_run_duration
          name: "H2Oh-no zone 3 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_3
      - valve_switch: "H2Oh-no zone 4"
        enable_switch: "H2Oh-no enable zone 4"
        run_duration_number:
          id: z4_run_duration
          name: "H2Oh-no zone 4 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_4
      - valve_switch: "H2Oh-no zone 5"
        enable_switch: "H2Oh-no enable zone 5"
        run_duration_number:
          id: z5_run_duration
          name: "H2Oh-no zone 5 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_5
      - valve_switch: "H2Oh-no zone 6"
        enable_switch: "H2Oh-no enable zone 6"
        run_duration_number:
          id: z6_run_duration
          name: "H2Oh-no zone 6 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_6
      - valve_switch: "H2Oh-no zone 7"
        enable_switch: "H2Oh-no enable zone 7"
        run_duration_number:
          id: z7_run_duration
          name: "H2Oh-no zone 7 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_7
      - valve_switch: "H2Oh-no zone 8"
        enable_switch: "H2Oh-no enable zone 8"
        run_duration_number:
          id: z8_run_duration
          name: "H2Oh-no zone 8 run time"
          min_value: 10
          max_value: 3600
          step: 10
          initial_value: 600
        valve_switch_id: valve_8

###############################################################################
# VALVE CONTROLLER (C++)
###############################################################################

h2oh_no_controller:
  id: h2oh_ctrl
  status_led_pin: P28
  valves:
    - valve_1
    - valve_2
    - valve_3
    - valve_4
    - valve_5
    - valve_6
    - valve_7
    - valve_8
  leds:
    - led_1
    - led_2
    - led_3
    - led_4
    - led_5
    - led_6
    - led_7
    - led_8

###############################################################################
# DIAGNOSTICS (HA)
###############################################################################

text_sensor:
  - platform: template
    name: "H2Oh-no diagnostics"
    id: h2oh_diag
    update_interval: 5s
    lambda: |-
      char buf[80];
      snprintf(buf, sizeof(buf), "mask=0x%02X svc=%d sel=%d",
               id(h2oh_ctrl).valve_mask(),
               id(h2oh_ctrl).is_service_mode() ? 1 : 0,
               id(h2oh_ctrl).selected_valve());
      return std::string(buf);

###############################################################################
# BUTTONS
###############################################################################

binary_sensor:
  - platform: gpio
    id: btn_up
    pin:
      number: P6
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms

    on_press:
      then:
        - if:
            condition:
              lambda: "return !id(h2oh_ctrl).is_service_mode();"
            then:
              - lambda: |-
                  id(h2oh_ctrl).button_up();
              - script.execute: beep_click
              - script.execute: blink_selected

  - platform: gpio
    id: btn_down
    pin:
      number: P7
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms

    on_press:
      then:
        - if:
            condition:
              lambda: "return !id(h2oh_ctrl).is_service_mode();"
            then:
              - lambda: |-
                  id(h2oh_ctrl).button_down();
              - script.execute: beep_click
              - script.execute: blink_selected

  - platform: gpio
    id: btn_ok
    pin:
      number: P8
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms

    on_multi_click:

      # SHORT CLICK
      - timing:
          - ON for 50ms to 700ms
        then:
          - if:
              condition:
                lambda: "return !id(h2oh_ctrl).is_service_mode();"
              then:
                - script.execute: toggle_selected_valve

      # HOLD ~2–4.5s, THEN RELEASE -> EMERGENCY STOP (does not clash with 5s service mode)
      - timing:
          - ON for 2000ms to 4500ms
          - OFF for at least 50ms
        then:
          - script.execute: emergency_stop

      # LONG HOLD -> SERVICE MODE
      - timing:
          - ON for at least 5s
        then:
          - lambda: |-
              id(h2oh_ctrl).toggle_service_mode();
          - if:
              condition:
                lambda: "return id(h2oh_ctrl).is_service_mode();"
              then:
                - script.execute: service_mode_enter
              else:
                - script.execute: service_mode_exit

###############################################################################
# HOME ASSISTANT BUTTONS
###############################################################################

button:
  - platform: template
    name: "Emergency STOP"
    on_press:
      - script.execute: emergency_stop

###############################################################################
# SCRIPTS
###############################################################################

script:

###############################################################################
# SAFE BOOT
###############################################################################

  - id: safe_boot
    then:
      - script.execute: emergency_stop_silent
      - script.execute: refresh_leds

###############################################################################
# EMERGENCY STOP
###############################################################################

  - id: emergency_stop_silent
    then:
      - lambda: |-
          id(h2oh_ctrl).emergency_stop();
      - sprinkler.shutdown: h2oh_sprinkler

  - id: emergency_stop
    then:
      - script.execute: emergency_stop_silent
      - script.execute: beep_error

###############################################################################
# REFRESH LEDS
###############################################################################

  - id: refresh_leds
    then:
      - lambda: |-
          id(h2oh_ctrl).refresh_leds();

###############################################################################
# BLINK SELECTED
###############################################################################

  - id: blink_selected
    mode: restart
    then:
      - lambda: |-
          id(h2oh_ctrl).blink_selection_indicator();

###############################################################################
# TOGGLE VALVE
###############################################################################

  - id: toggle_selected_valve
    then:
      - lambda: |-
          id(h2oh_ctrl).toggle_selected();
      - script.execute: beep_ok

###############################################################################
# SERVICE MODE
###############################################################################

  - id: service_mode_enter
    then:
      - script.execute: emergency_stop

      - repeat:
          count: 2
          then:
            - output.turn_on: buzzer
            - delay: 120ms
            - output.turn_off: buzzer
            - delay: 120ms

      - repeat:
          count: 2
          then:
            - switch.turn_on: led_1
            - switch.turn_on: led_2
            - switch.turn_on: led_3
            - switch.turn_on: led_4
            - switch.turn_on: led_5
            - switch.turn_on: led_6
            - switch.turn_on: led_7
            - switch.turn_on: led_8
            - delay: 200ms
            - script.execute: refresh_leds
            - delay: 200ms

  - id: service_mode_exit
    then:
      - script.execute: beep_boot
      - script.execute: refresh_leds

###############################################################################
# BEEPS
###############################################################################

  - id: beep_click
    then:
      - output.turn_on: buzzer
      - delay: 35ms
      - output.turn_off: buzzer

  - id: beep_ok
    then:
      - repeat:
          count: 2
          then:
            - output.turn_on: buzzer
            - delay: 60ms
            - output.turn_off: buzzer
            - delay: 60ms

  - id: beep_error
    then:
      - repeat:
          count: 3
          then:
            - output.turn_on: buzzer
            - delay: 120ms
            - output.turn_off: buzzer
            - delay: 120ms

  - id: beep_boot
    then:
      - output.turn_on: buzzer
      - delay: 120ms
      - output.turn_off: buzzer
